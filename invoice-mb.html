function renderDiscountPresetList(){
  const list=document.getElementById('discountPresetList');
  if(!list)return;
  if(discountPresets.length===0){
    list.innerHTML='<div style="text-align:center;color:var(--text3);font-size:12px;padding:16px;">Belum ada preset diskon</div>';
    return;
  }
  list.innerHTML=discountPresets.map(p=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);">
      <div>
        <div style="font-size:13px;font-weight:600;color:var(--text);">${p.name}</div>
        <div style="font-size:11px;color:var(--text3);">${p.type==='persen'?p.value+'%':rp(p.value)}</div>
      </div>
      <button onclick="removeDiscountPreset('${p.__id}')" style="width:30px;height:30px;border-radius:6px;border:1px solid var(--danger);background:var(--danger-dim);color:var(--danger);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;line-height:1;">×</button>
    </div>`).join('');
}

async function addDiscountPreset(){
  const name=document.getElementById('newDiscName').value.trim();
  const type=document.getElementById('newDiscType').value;
  const value=parseFloat(document.getElementById('newDiscValue').value)||0;
  if(!name){showToast('Nama diskon wajib diisi.',false);return;}
  if(!value){showToast('Nilai diskon wajib diisi.',false);return;}
  const btn=document.getElementById('btnAddDiscount');
  btn.textContent='Menyimpan...';btn.disabled=true;
  try{
    await saveDiscountPreset(name,type,value);
    document.getElementById('newDiscName').value='';
    document.getElementById('newDiscValue').value='';
    renderDiscountPresetList();
    showToast('Preset diskon tersimpan! ✓',true);
  }catch(e){showToast('Gagal: '+e.message,false);
  }finally{btn.textContent='+ Tambah Preset';btn.disabled=false;}
}

async function removeDiscountPreset(id){
  if(!confirm('Hapus preset diskon ini?'))return;
  try{
    await deleteDiscountPreset(id);
    renderDiscountPresetList();
    showToast('Preset dihapus.',true);
  }catch(e){showToast('Gagal hapus: '+e.message,false);}
}

function closeModal(id){document.getElementById(id).classList.remove('open');}
function showToast(msg,success){
  const t=document.createElement('div');
  t.style.cssText=`position:fixed;bottom:20px;right:20px;background:${success?'#2E9E5B':'#DC3545'};color:#fff;padding:12px 16px;border-radius:8px;font-size:13px;font-weight:500;z-index:9999;animation:slideIn .3s ease;max-width:320px;box-shadow:0 4px 16px rgba(0,0,0,0.2);`;
  t.textContent=msg;document.body.appendChild(t);
  setTimeout(()=>{t.style.animation='slideOut .3s ease';setTimeout(()=>t.remove(),300);},3500);
}
function rp(n){return 'Rp '+Number(n).toLocaleString('id-ID');}
function isoDate(d){return d.toISOString().split('T')[0];}
function fmtLong(d){return d.toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});}
function parseDate(s){
  if(!s||s==='—'||s==='')return null;
  if(s instanceof Date)return s;
  if(typeof s==='number')return new Date((s-25569)*86400*1000);
  const str=String(s).trim();
  const m=str.match(/^(\d{4}-\d{2}-\d{2})/);
  if(m)return new Date(m[1]+'T00:00:00');
  const parts=str.split(/[\/\-]/);
  if(parts.length===3&&parseInt(parts[2])>31)return new Date(parseInt(parts[2]),parseInt(parts[1])-1,parseInt(parts[0]));
  const d=new Date(str);
  return isNaN(d.getTime())?null:d;
}
function fmtShort(s){
  if(!s||s==='—'||s==='')return '—';
  const d=parseDate(s);
  if(!d)return String(s)||'—';
  return d.toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'});
}
function fmtTime(d){return d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});}

  if(isDark){document.documentElement.removeAttribute('data-theme');localStorage.setItem('mrkz_theme','light');}
  else{document.documentElement.setAttribute('data-theme','dark');localStorage.setItem('mrkz_theme','dark');}

  updateDarkLabel();
}

async function copyReminderImg(){
  try{
    const res=await fetch(REMINDER_IMG_B64);

          <div class="notif-popup-feat-icon" style="background:var(--success-dim);">
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <span>Notif muncul langsung, meski app di background</span>
        </div>
        <div class="notif-popup-feat">
          <div class="notif-popup-feat-icon" style="background:var(--accent-dim);">
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </div>
          <span>Update real-time tanpa perlu reload halaman</span>
        </div>
        <div class="notif-popup-feat">
          <div class="notif-popup-feat-icon" style="background:var(--warning-dim);">
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--warning)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          </div>
          <span>Aman — hanya notifikasi dari Markaz Belajar</span>
        </div>
      </div>
      <div class="notif-popup-actions">
        <button class="notif-popup-allow" onclick="allowNotifFromPopup()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          Izinkan Notifikasi
        </button>
        <button class="notif-popup-skip" onclick="dismissNotifPopup()">Nanti Saja</button>
      </div>
    </div>
  </div>
</div>
