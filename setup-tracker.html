<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>MB Setup Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#1B6CA8;--blue-d:#EAF3FB;
  --green:#2E9E5B;--green-d:#E6F7EE;
  --yellow:#F59F00;--yellow-d:#FFF8DC;
  --red:#DC3545;--red-d:#FDECEA;
  --ink:#1C2B3A;--ink2:#4A6070;--ink3:#96AAB8;
  --bg:#F9F9F9;--white:#FFFFFF;--bd:#EDF1F5;--bd2:#D0D5DD;
  --shadow:0 4px 20px rgba(28,43,58,0.09);--r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{font-family:'Rubik',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}

.hdr{background:linear-gradient(135deg,#1457A8,#2484CE);position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(20,87,168,0.3)}
.hdr-inner{max-width:1200px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.hdr-brand{font-size:17px;font-weight:700;color:#fff}
.hdr-sub{font-size:11px;color:rgba(255,255,255,0.6);margin-top:1px}
.hdr-actions{display:flex;gap:8px}
.hbtn{background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.25);border-radius:10px;padding:7px 14px;font-family:'Rubik',sans-serif;font-size:12px;font-weight:600;color:#fff;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px;white-space:nowrap}
.hbtn:hover{background:rgba(255,255,255,0.28)}
.hbtn svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.hbtn.add{background:rgba(255,255,255,0.9);color:var(--blue)}
.hbtn.add:hover{background:#fff}

.wrap{max-width:1200px;margin:0 auto;padding:16px 20px}

.sum-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
@media(max-width:600px){.sum-grid{grid-template-columns:repeat(2,1fr)}}
.sum-card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:13px 16px;box-shadow:var(--shadow)}
.sum-n{font-size:26px;font-weight:800;line-height:1;margin-bottom:2px}
.sum-l{font-size:11px;color:var(--ink3);font-weight:500}
.c-total .sum-n{color:var(--blue)}
.c-done  .sum-n{color:var(--green)}
.c-proc  .sum-n{color:var(--yellow)}
.c-sisa  .sum-n{color:var(--red)}

.prog-card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:16px 20px;margin-bottom:14px;box-shadow:var(--shadow)}
.prog-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.prog-lbl{font-size:14px;font-weight:700}
.prog-pct{font-size:14px;font-weight:700;color:var(--blue)}
.prog-bar{height:10px;background:#EDF1F5;border-radius:99px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#1B6CA8,#2484CE);transition:width .6s}
.prog-meta{display:flex;gap:14px;margin-top:8px;font-size:11px;color:var(--ink3);flex-wrap:wrap}
.prog-meta span{display:flex;align-items:center;gap:4px}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

.tabs-scroll{overflow-x:auto;padding-bottom:2px;margin-bottom:14px}
.tabs{display:flex;gap:6px;min-width:max-content}
.tab{padding:8px 16px;border-radius:50px;font-family:'Rubik',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--bd);background:var(--white);color:var(--ink3);transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:6px}
.tab:hover{border-color:var(--blue);color:var(--blue)}
.tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.tab .tc{font-size:10px;padding:1px 6px;border-radius:99px;background:var(--blue-d);color:var(--blue)}
.tab.active .tc{background:rgba(255,255,255,0.25);color:#fff}

.cat-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.cat-title{font-size:17px;font-weight:700}
.cat-meta{font-size:12px;color:var(--ink3)}
.cat-meta strong{color:var(--ink)}
.mini-prog{display:flex;align-items:center;gap:8px}
.mini-bar{width:100px;height:6px;background:#EDF1F5;border-radius:99px;overflow:hidden}
.mini-fill{height:100%;border-radius:99px;background:var(--green);transition:width .5s}
.mini-txt{font-size:12px;font-weight:600;color:var(--ink3)}

.filt-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.fb{padding:6px 13px;border-radius:50px;font-family:'Rubik',sans-serif;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--bd);background:var(--white);color:var(--ink3);transition:all .15s}
.fb.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.fb.fs.active{background:var(--green);border-color:var(--green)}
.fb.fp.active{background:var(--yellow);border-color:var(--yellow);color:#0a2846}
.fb.fb2.active{background:var(--ink3);border-color:var(--ink3)}

.item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
@media(max-width:480px){.item-grid{grid-template-columns:1fr 1fr}}

.icard{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);transition:transform .12s,box-shadow .12s}
.icard:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(28,43,58,0.12)}
.icard.sudah{border-color:rgba(46,158,91,0.3)}
.icard.proses{border-color:rgba(245,159,0,0.35)}

.img-wrap{position:relative;height:160px;background:#f0f2f5;overflow:hidden}
.img-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.img-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f0f2f5,#e4e7ec)}
.img-ph svg{width:32px;height:32px;stroke:#c0c8d0;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.stamp{position:absolute;top:8px;right:8px;background:var(--green);color:#fff;font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:.04em}
.stamp.pr{background:var(--yellow);color:#0a2846}

.ibody{padding:11px 13px}
.iname{font-size:13px;font-weight:600;color:var(--ink);line-height:1.4;margin-bottom:5px}
.iprice{font-size:15px;font-weight:700;color:var(--blue);margin-bottom:8px}
.ifooter{display:flex;align-items:center;justify-content:space-between;gap:6px}
.sbadge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
.sb-belum{background:#F2F4F6;color:var(--ink3)}
.sb-proses{background:var(--yellow-d);color:#856404;border:1px solid #FFE08A}
.sb-sudah{background:var(--green-d);color:var(--green);border:1px solid rgba(46,158,91,0.25)}
.ilink{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--blue);text-decoration:none;padding:4px 10px;background:var(--blue-d);border-radius:20px;transition:all .15s;white-space:nowrap}
.ilink:hover{background:var(--blue);color:#fff}
.ilink svg{width:11px;height:11px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.inote{font-size:11px;color:var(--ink3);margin-top:6px;line-height:1.4}
.iactions{display:flex;gap:5px;margin-top:8px}
.iact{flex:1;padding:6px;border-radius:8px;font-family:'Rubik',sans-serif;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:var(--bg);color:var(--ink3);transition:all .15s;text-align:center}
.iact:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-d)}
.iact.del:hover{border-color:var(--red);color:var(--red);background:var(--red-d)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(28,43,58,0.55);z-index:300;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
.overlay.open{opacity:1;pointer-events:all}
@media(min-width:600px){.overlay{align-items:center}}
.modal{background:var(--white);border-radius:24px 24px 0 0;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;padding:0 0 32px;transform:translateY(40px);transition:transform .3s cubic-bezier(.32,.72,0,1)}
@media(min-width:600px){.modal{border-radius:20px;transform:scale(0.95)}}
.overlay.open .modal{transform:translateY(0)}
@media(min-width:600px){.overlay.open .modal{transform:scale(1)}}
.modal-handle{width:36px;height:4px;background:#d0d5dd;border-radius:99px;margin:14px auto 0}
.modal-head{padding:16px 20px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:700}
.modal-close{width:30px;height:30px;border-radius:50%;border:none;background:var(--bg);color:var(--ink3);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.modal-close:hover{background:var(--bd);color:var(--ink)}
.modal-body{padding:16px 20px 0}
.field{margin-bottom:14px}
label{display:block;font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:5px}
input[type=text],input[type=number],input[type=url],select,textarea{width:100%;padding:10px 12px;background:var(--bg);border:1.5px solid var(--bd);border-radius:10px;font-family:'Rubik',sans-serif;font-size:13px;color:var(--ink);outline:none;transition:border .15s;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--blue);background:var(--white)}
textarea{resize:vertical;min-height:70px}

/* UPLOAD */
.upzone{border:2px dashed var(--bd2);border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg);position:relative;overflow:hidden}
.upzone:hover{border-color:var(--blue);background:var(--blue-d)}
.upzone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upzone-ico{width:36px;height:36px;stroke:var(--ink3);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;margin:0 auto 8px;display:block}
.upzone-txt{font-size:13px;font-weight:600;color:var(--ink3)}
.upzone-sub{font-size:11px;color:var(--ink3);margin-top:3px}
.up-prog-wrap{margin-top:10px;display:none}
.up-prog{height:6px;background:var(--bd);border-radius:99px;overflow:hidden}
.up-prog-fill{height:100%;background:var(--blue);border-radius:99px;transition:width .4s;width:0%}
.up-prog-txt{font-size:11px;color:var(--blue);margin-top:4px;text-align:center;font-weight:600}
.up-status{margin-top:8px;font-size:12px;font-weight:600;text-align:center}
.up-status.ok{color:var(--green)}
.up-status.err{color:var(--red)}
.up-status.loading{color:var(--blue)}
.up-preview{margin-top:10px;position:relative;display:none}
.up-preview img{width:100%;max-height:180px;object-fit:cover;display:block;border-radius:10px;border:1px solid var(--bd)}
.up-preview-rm{position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.6);color:#fff;border:none;border-radius:50%;width:26px;height:26px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.up-preview-rm:hover{background:rgba(220,53,69,0.85)}

.modal-acts{display:flex;gap:10px;padding:16px 20px 0}
.btn-cancel{flex:1;padding:11px;border-radius:12px;border:1.5px solid var(--bd);background:var(--white);font-family:'Rubik',sans-serif;font-size:14px;font-weight:600;color:var(--ink3);cursor:pointer;transition:all .15s}
.btn-cancel:hover{background:var(--bg)}
.btn-save{flex:2;padding:11px;border-radius:12px;border:none;background:var(--blue);font-family:'Rubik',sans-serif;font-size:14px;font-weight:700;color:#fff;cursor:pointer;transition:all .15s}
.btn-save:hover{opacity:.9}
.btn-save:disabled{opacity:.4;cursor:default}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:11px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:500;transition:transform .3s;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.2)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--green)}
.toast.err{background:var(--red)}

.loading{text-align:center;padding:48px 20px;color:var(--ink3)}
.spinner{width:28px;height:28px;border:2.5px solid var(--bd);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:32px;color:var(--ink3);font-size:13px}

@media(min-width:769px){.hdr-inner,.wrap{padding-left:32px;padding-right:32px}}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-inner">
    <div>
      <div class="hdr-brand">🏫 MB Setup Tracker</div>
      <div class="hdr-sub">Markaz Belajar — Wishlist Setup Kelas</div>
    </div>
    <div class="hdr-actions">
      <button class="hbtn" onclick="loadData()">
        <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-5"/></svg>
        Refresh
      </button>
      <button class="hbtn add" onclick="openAdd()">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Tambah
      </button>
    </div>
  </div>
</div>

<!-- CONTENT -->
<div class="wrap">
  <div class="sum-grid">
    <div class="sum-card c-total"><div class="sum-n" id="s-total">—</div><div class="sum-l">Total Item</div></div>
    <div class="sum-card c-done"><div class="sum-n" id="s-done">—</div><div class="sum-l">Sudah Dibeli</div></div>
    <div class="sum-card c-proc"><div class="sum-n" id="s-proc">—</div><div class="sum-l">Sedang Proses</div></div>
    <div class="sum-card c-sisa"><div class="sum-n" id="s-sisa">—</div><div class="sum-l">Belum Dibeli</div></div>
  </div>
  <div class="prog-card">
    <div class="prog-head">
      <div class="prog-lbl">Progress Keseluruhan</div>
      <div class="prog-pct" id="prog-pct">0%</div>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="prog-meta">
      <span><span class="dot" style="background:var(--green)"></span>Terbeli: <strong id="m-done">Rp 0</strong></span>
      <span><span class="dot" style="background:var(--yellow)"></span>Proses: <strong id="m-proc">Rp 0</strong></span>
      <span><span class="dot" style="background:#EDF1F5;border:1px solid #d0d5dd"></span>Sisa: <strong id="m-sisa">Rp 0</strong></span>
    </div>
  </div>
  <div class="tabs-scroll"><div class="tabs" id="tabs"></div></div>
  <div id="content"><div class="loading"><div class="spinner"></div><div>Memuat data...</div></div></div>
</div>

<!-- MODAL -->
<div class="overlay" id="modal-overlay" onclick="onOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <div class="modal-title" id="modal-title">Tambah Item</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="f-row"/>
      <div class="field">
        <label>Kategori *</label>
        <select id="f-kat">
          <option value="">— Pilih —</option>
          <option>CLASS</option><option>MONTESORI</option><option>STUDIO</option>
          <option>ELEMENTRY</option><option>S&E</option><option>GARDEN</option>
          <option>MERCHANDISE</option><option>Lainnya</option>
        </select>
      </div>
      <div class="field">
        <label>Nama Produk *</label>
        <input type="text" id="f-nama" placeholder="Nama item..."/>
      </div>
      <div class="field">
        <label>Harga (Rp)</label>
        <input type="number" id="f-harga" placeholder="678000"/>
      </div>
      <div class="field">
        <label>Link Beli</label>
        <input type="url" id="f-link" placeholder="https://tokopedia.com/..."/>
      </div>
      <div class="field">
        <label>Gambar Produk</label>
        <div class="upzone" id="upzone">
          <input type="file" id="f-file" accept="image/*" onchange="onFileChange(event)"/>
          <svg class="upzone-ico" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <div class="upzone-txt">Klik atau drag gambar ke sini</div>
          <div class="upzone-sub">JPG, PNG, WebP — maks 5MB</div>
        </div>
        <div class="up-prog-wrap" id="up-prog-wrap">
          <div class="up-prog"><div class="up-prog-fill" id="up-prog-fill"></div></div>
          <div class="up-prog-txt" id="up-prog-txt">Mengupload...</div>
        </div>
        <div class="up-status" id="up-status"></div>
        <div class="up-preview" id="up-preview">
          <img id="up-img" src="" alt="preview"/>
          <button class="up-preview-rm" onclick="removeImg()">✕</button>
        </div>
        <input type="hidden" id="f-gambar"/>
      </div>
      <div class="field">
        <label>Status</label>
        <select id="f-status">
          <option value="Belum">Belum Dibeli</option>
          <option value="Proses">Sedang Proses</option>
          <option value="Sudah">Sudah Dibeli</option>
        </select>
      </div>
      <div class="field">
        <label>Prioritas</label>
        <select id="f-prio">
          <option value="">—</option>
          <option value="Tinggi">Tinggi</option>
          <option value="Sedang">Sedang</option>
          <option value="Rendah">Rendah</option>
        </select>
      </div>
      <div class="field">
        <label>Catatan</label>
        <textarea id="f-cat" placeholder="Catatan opsional..."></textarea>
      </div>
    </div>
    <div class="modal-acts">
      <button class="btn-cancel" onclick="closeModal()">Batal</button>
      <button class="btn-save" id="btn-save" onclick="saveItem()">Simpan</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SHEET_ID = '1Y0SOCfL7Xi0TCZJQvicGLVuP2cmQhOkLjfCFC_JEvQY';
const GAS_URL  = 'https://script.google.com/macros/s/AKfycbzESqcrKVpCk7AkdkfqjCvu0JjuxjBF1rs5DU9N8aOgWwy4oDT9DXKcvnHG0IiZKGGI/exec';
const CSV_URL  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Sheet1`;

let allData=[], currentCat='semua', currentFilter='semua';
let editRow=null, uploadedImgUrl='', uploading=false;

// ── CSV PARSER ──
function parseCSV(txt){
  const rows=[];let cur='',inQ=false,row=[];
  for(let i=0;i<txt.length;i++){
    const c=txt[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){row.push(cur.replace(/^"|"$/g,'').replace(/""/g,'"'));cur='';}
    else if((c==='\n'||c==='\r')&&!inQ){
      row.push(cur.replace(/^"|"$/g,'').replace(/""/g,'"'));
      if(row.some(x=>x.trim()))rows.push(row);
      row=[];cur='';if(txt[i+1]==='\n')i++;
    }else cur+=c;
  }
  if(cur||row.length){row.push(cur.replace(/^"|"$/g,'').replace(/""/g,'"'));if(row.some(x=>x.trim()))rows.push(row);}
  return rows;
}

function rp(n){return n?'Rp '+Number(n).toLocaleString('id-ID'):'—'}
function parseHarga(s){return parseInt(String(s||'').replace(/[^0-9]/g,''))||0}

// ── LOAD DATA ──
async function loadData(){
  document.getElementById('content').innerHTML='<div class="loading"><div class="spinner"></div><div>Memuat data...</div></div>';
  try{
    const res=await fetch(CSV_URL+'&t='+Date.now());
    if(!res.ok)throw new Error('HTTP '+res.status);
    const txt=await res.text();
    const rows=parseCSV(txt);
    if(rows.length<2){setContent('<div class="empty">Sheet kosong. Tambah item dulu.</div>');return;}
    const hdr=rows[0].map(h=>h.trim().toLowerCase());
    const col=ns=>{for(const n of ns){const i=hdr.findIndex(h=>h.includes(n));if(i>=0)return i;}return -1;};
    const iK=col(['kategori']),iN=col(['nama']),iH=col(['harga']),
          iL=col(['link']),iG=col(['gambar']),iS=col(['status']),
          iP=col(['prioritas']),iC=col(['catatan']);
    allData=[];
    for(let i=1;i<rows.length;i++){
      const r=rows[i];
      const nama=(iN>=0?r[iN]:'').trim();
      if(!nama)continue;
      allData.push({
        row:i+1,
        kategori:(iK>=0?r[iK]:'Lainnya').trim()||'Lainnya',
        nama,harga:parseHarga(iH>=0?r[iH]:''),
        link:(iL>=0?r[iL]:'').trim(),
        gambar:(iG>=0?r[iG]:'').trim(),
        status:(iS>=0?r[iS]:'Belum').trim()||'Belum',
        prioritas:(iP>=0?r[iP]:'').trim(),
        catatan:(iC>=0?r[iC]:'').trim(),
      });
    }
    buildUI();
  }catch(e){
    setContent(`<div class="empty" style="color:var(--red)">Gagal memuat: ${e.message}<br><small>Pastikan Sheet sudah public</small></div>`);
  }
}

function setContent(h){document.getElementById('content').innerHTML=h}
function buildUI(){updateSummary();buildTabs();renderContent()}

function updateSummary(){
  const tot=allData.length;
  const don=allData.filter(d=>d.status.toLowerCase()==='sudah').length;
  const prc=allData.filter(d=>d.status.toLowerCase()==='proses').length;
  const pct=tot?Math.round(don/tot*100):0;
  const rpD=allData.filter(d=>d.status.toLowerCase()==='sudah').reduce((s,d)=>s+d.harga,0);
  const rpP=allData.filter(d=>d.status.toLowerCase()==='proses').reduce((s,d)=>s+d.harga,0);
  const rpS=allData.filter(d=>d.status.toLowerCase()!=='sudah').reduce((s,d)=>s+d.harga,0);
  document.getElementById('s-total').textContent=tot;
  document.getElementById('s-done').textContent=don;
  document.getElementById('s-proc').textContent=prc;
  document.getElementById('s-sisa').textContent=tot-don-prc;
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('m-done').textContent=rp(rpD);
  document.getElementById('m-proc').textContent=rp(rpP);
  document.getElementById('m-sisa').textContent=rp(rpS);
}

function buildTabs(){
  const cats=['semua',...new Set(allData.map(d=>d.kategori))];
  document.getElementById('tabs').innerHTML=cats.map(c=>{
    const cnt=c==='semua'?allData.length:allData.filter(d=>d.kategori===c).length;
    return`<div class="tab${c===currentCat?' active':''}" onclick="switchTab('${c}')">${c==='semua'?'Semua':c}<span class="tc">${cnt}</span></div>`;
  }).join('');
}

function switchTab(c){
  currentCat=c;currentFilter='semua';
  document.querySelectorAll('.tab').forEach(t=>{
    const label=t.childNodes[0].textContent.trim();
    t.classList.toggle('active',label===(c==='semua'?'Semua':c));
  });
  renderContent();
}

function switchFilter(f){
  currentFilter=f;
  document.querySelectorAll('.fb').forEach(b=>b.classList.toggle('active',b.dataset.f===f));
  renderCards();
}

function renderContent(){
  const cd=currentCat==='semua'?allData:allData.filter(d=>d.kategori===currentCat);
  const don=cd.filter(d=>d.status.toLowerCase()==='sudah').length;
  const prc=cd.filter(d=>d.status.toLowerCase()==='proses').length;
  const tot=cd.length;
  const pct=tot?Math.round(don/tot*100):0;
  const totRp=cd.reduce((s,d)=>s+d.harga,0);
  const donRp=cd.filter(d=>d.status.toLowerCase()==='sudah').reduce((s,d)=>s+d.harga,0);
  document.getElementById('content').innerHTML=`
    <div class="cat-head">
      <div>
        <div class="cat-title">${currentCat==='semua'?'Semua Item':currentCat}</div>
        <div class="cat-meta">${tot} item · Budget: <strong>${rp(totRp)}</strong> · Terbeli: <strong style="color:var(--green)">${rp(donRp)}</strong></div>
      </div>
      <div class="mini-prog">
        <div class="mini-bar"><div class="mini-fill" style="width:${pct}%"></div></div>
        <div class="mini-txt">${pct}%</div>
      </div>
    </div>
    <div class="filt-row">
      <button class="fb active" data-f="semua" onclick="switchFilter('semua')">Semua (${tot})</button>
      <button class="fb fs" data-f="sudah" onclick="switchFilter('sudah')">✓ Sudah (${don})</button>
      <button class="fb fp" data-f="proses" onclick="switchFilter('proses')">↻ Proses (${prc})</button>
      <button class="fb fb2" data-f="belum" onclick="switchFilter('belum')">○ Belum (${tot-don-prc})</button>
    </div>
    <div class="item-grid" id="item-grid"></div>`;
  renderCards();
}

function renderCards(){
  const cd=currentCat==='semua'?allData:allData.filter(d=>d.kategori===currentCat);
  const list=currentFilter==='semua'?cd:cd.filter(d=>d.status.toLowerCase()===currentFilter);
  const grid=document.getElementById('item-grid');
  if(!list.length){grid.innerHTML='<div class="empty">Tidak ada item.</div>';return;}
  grid.innerHTML=list.map(item=>{
    const st=item.status.toLowerCase();
    const scls=st==='sudah'?'sb-sudah':st==='proses'?'sb-proses':'sb-belum';
    const stxt=st==='sudah'?'✓ Sudah':st==='proses'?'↻ Proses':'○ Belum';
    const ccls=st==='sudah'?'sudah':st==='proses'?'proses':'';
    const imgH=item.gambar
      ?`<img src="${item.gambar}" alt="${item.nama}" loading="lazy" onerror="this.outerHTML='<div class=\\'img-ph\\'><svg viewBox=\\'0 0 24 24\\'><rect x=\\'3\\' y=\\'3\\' width=\\'18\\' height=\\'18\\' rx=\\'2\\'/><circle cx=\\'8.5\\' cy=\\'8.5\\' r=\\'1.5\\'/><polyline points=\\'21 15 16 10 5 21\\'/></svg></div>'">`
      :`<div class="img-ph"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>`;
    const stamp=st==='sudah'?'<span class="stamp">✓ DIBELI</span>':st==='proses'?'<span class="stamp pr">↻ PROSES</span>':'';
    const linkH=item.link?`<a class="ilink" href="${item.link}" target="_blank" rel="noopener"><svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>Beli</a>`:'';
    const noteH=item.catatan?`<div class="inote">${item.catatan}</div>`:'';
    const itemJson=JSON.stringify(item).replace(/'/g,"\\'");
    return`
      <div class="icard ${ccls}">
        <div class="img-wrap">${imgH}${stamp}</div>
        <div class="ibody">
          <div class="iname">${item.nama}</div>
          <div class="iprice">${item.harga?rp(item.harga):'—'}</div>
          <div class="ifooter">
            <span class="sbadge ${scls}">${stxt}</span>
            ${linkH}
          </div>
          ${noteH}
          <div class="iactions">
            <button class="iact" onclick="openEdit(${item.row})">✎ Edit</button>
            <button class="iact del" onclick="deleteItem(${item.row},'${item.nama.replace(/'/g,"\\'")}')">✕ Hapus</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

// ── MODAL ──
function resetModal(){
  ['f-row','f-nama','f-harga','f-link','f-gambar','f-cat'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-kat').value='';
  document.getElementById('f-status').value='Belum';
  document.getElementById('f-prio').value='';
  document.getElementById('f-file').value='';
  document.getElementById('up-preview').style.display='none';
  document.getElementById('up-status').textContent='';
  document.getElementById('up-status').className='up-status';
  document.getElementById('up-prog-wrap').style.display='none';
  uploadedImgUrl='';
}

function openAdd(){
  editRow=null;
  resetModal();
  document.getElementById('modal-title').textContent='Tambah Item';
  document.getElementById('modal-overlay').classList.add('open');
}

function openEdit(row){
  const item=allData.find(d=>d.row===row);
  if(!item)return;
  editRow=row;
  resetModal();
  document.getElementById('modal-title').textContent='Edit Item';
  document.getElementById('f-row').value=row;
  document.getElementById('f-kat').value=item.kategori;
  document.getElementById('f-nama').value=item.nama;
  document.getElementById('f-harga').value=item.harga||'';
  document.getElementById('f-link').value=item.link||'';
  document.getElementById('f-gambar').value=item.gambar||'';
  document.getElementById('f-status').value=item.status||'Belum';
  document.getElementById('f-prio').value=item.prioritas||'';
  document.getElementById('f-cat').value=item.catatan||'';
  uploadedImgUrl=item.gambar||'';
  if(item.gambar){
    document.getElementById('up-img').src=item.gambar;
    document.getElementById('up-preview').style.display='block';
  }
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(){document.getElementById('modal-overlay').classList.remove('open')}
function onOverlayClick(e){if(e.target===document.getElementById('modal-overlay'))closeModal()}

// ── FILE UPLOAD → GDrive ──
function onFileChange(e){
  const file=e.target.files[0];
  if(!file)return;
  if(file.size>5*1024*1024){setUpStatus('err','File terlalu besar (maks 5MB)');return;}
  const reader=new FileReader();
  reader.onload=evt=>{
    document.getElementById('up-img').src=evt.target.result;
    document.getElementById('up-preview').style.display='block';
    uploadToGDrive(evt.target.result,file.name,file.type);
  };
  reader.readAsDataURL(file);
}

async function uploadToGDrive(base64,filename,mimeType){
  if(uploading)return;
  uploading=true;
  setUpStatus('loading','⏳ Mengupload ke Google Drive...');
  document.getElementById('up-prog-wrap').style.display='block';
  setProgBar(20,'Mengirim...');
  try{
    setProgBar(40,'Mengupload...');
    const res=await fetch(GAS_URL,{
      method:'POST',redirect:'follow',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({base64,filename,mimeType})
    });
    setProgBar(80,'Memproses...');
    const json=await res.json();
    setProgBar(100,'Selesai!');
    setTimeout(()=>{document.getElementById('up-prog-wrap').style.display='none';},800);
    if(json.success&&json.url){
      uploadedImgUrl=json.url;
      document.getElementById('f-gambar').value=json.url;
      document.getElementById('up-img').src=json.url;
      setUpStatus('ok','✓ Gambar berhasil diupload ke Drive');
    } else {
      setUpStatus('err','Gagal upload: '+(json.error||'unknown'));
    }
  }catch(err){
    setUpStatus('err','Error: '+err.message);
    document.getElementById('up-prog-wrap').style.display='none';
  } finally {
    uploading=false;
  }
}

function setProgBar(pct,txt){
  document.getElementById('up-prog-fill').style.width=pct+'%';
  document.getElementById('up-prog-txt').textContent=txt;
}

function setUpStatus(type,msg){
  const el=document.getElementById('up-status');
  el.className='up-status '+type;
  el.textContent=msg;
}

function removeImg(){
  uploadedImgUrl='';
  document.getElementById('f-gambar').value='';
  document.getElementById('up-preview').style.display='none';
  document.getElementById('f-file').value='';
  document.getElementById('up-status').textContent='';
  document.getElementById('up-status').className='up-status';
}

// ── SAVE ──
async function saveItem(){
  if(uploading){toast('Tunggu upload gambar selesai','err');return;}
  const kat=document.getElementById('f-kat').value.trim();
  const nama=document.getElementById('f-nama').value.trim();
  if(!kat||!nama){toast('Kategori dan Nama wajib diisi','err');return;}
  const gambar=document.getElementById('f-gambar').value.trim()||uploadedImgUrl||'';
  const payload={
    action:editRow?'edit':'add',
    row:editRow||null,
    data:{
      kategori:kat,nama,
      harga:document.getElementById('f-harga').value||'',
      link:document.getElementById('f-link').value.trim()||'',
      gambar,
      status:document.getElementById('f-status').value||'Belum',
      prioritas:document.getElementById('f-prio').value||'',
      catatan:document.getElementById('f-cat').value.trim()||'',
    }
  };
  const btn=document.getElementById('btn-save');
  btn.disabled=true;btn.textContent='Menyimpan...';
  try{
    const res=await fetch(GAS_URL,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)});
    const json=await res.json();
    if(json.success){
      toast(editRow?'Item berhasil diupdate!':'Item berhasil ditambahkan!','ok');
      closeModal();
      setTimeout(loadData,800);
    } else {
      toast('Gagal: '+(json.error||'unknown'),'err');
    }
  }catch(e){toast('Error: '+e.message,'err');}
  finally{btn.disabled=false;btn.textContent='Simpan';}
}

// ── DELETE ──
async function deleteItem(row,nama){
  if(!confirm(`Hapus "${nama}"?`))return;
  try{
    const res=await fetch(GAS_URL,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'delete',row})});
    const json=await res.json();
    if(json.success){toast('Item dihapus','ok');setTimeout(loadData,600);}
    else toast('Gagal hapus: '+(json.error||''),'err');
  }catch(e){toast('Error: '+e.message,'err');}
}

// ── TOAST ──
function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className='toast show '+(type==='err'?'err':'ok');
  setTimeout(()=>el.classList.remove('show'),3000);
}

loadData();
</script>
